<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 - Page Lost in Space</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;700&display=swap');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Poppins', sans-serif;
            background: radial-gradient(circle at center, #1b2735 0%, #090a0f 100%);
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            overflow: hidden;
            text-align: center;
        }

        .container {
            z-index: 10;
            padding: 20px;
        }

        .glitch-wrapper {
            position: relative;
        }

        h1 {
            font-size: 10rem;
            font-weight: 700;
            margin: 0;
            line-height: 1;
            background: linear-gradient(to bottom, #00d2ff, #3a7bd5);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            filter: drop-shadow(0 0 20px rgba(0, 210, 255, 0.5));
            animation: float 4s ease-in-out infinite;
        }

        h2 {
            font-size: 2rem;
            margin-bottom: 15px;
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        p {
            color: #8f9aa7;
            margin-bottom: 30px;
            max-width: 500px;
            margin-left: auto;
            margin-right: auto;
        }

        .btn {
            display: inline-block;
            text-decoration: none;
            color: white;
            padding: 12px 35px;
            border-radius: 50px;
            background: linear-gradient(45deg, #ff00cc, #3333ff);
            font-weight: bold;
            transition: transform 0.3s, box-shadow 0.3s;
            box-shadow: 0 4px 15px rgba(255, 0, 204, 0.4);
        }

        .btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 6px 25px rgba(255, 0, 204, 0.6);
        }

        /* Dekorasi Partikel Bintang */
        .stars {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
        }

        .star {
            position: absolute;
            background: white;
            border-radius: 50%;
            opacity: 0.5;
            animation: twinkle var(--duration) infinite;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-20px); }
        }

        @keyframes twinkle {
            0%, 100% { opacity: 0.3; transform: scale(1); }
            50% { opacity: 1; transform: scale(1.2); }
        }
    </style>
</head>
<body>

    <div class="stars" id="starField"></div>

    <div class="container">
        <div class="glitch-wrapper">
            <h1>404</h1>
        </div>
        <h2>OOPS! PAGE LOST IN SPACE</h2>
        <p>Halaman yang kamu cari mungkin telah pindah ke dimensi lain atau tidak pernah ada sebelumnya.</p>
        <a href="/" class="btn">KEMBALI KE BUMI</a>
    </div>

    <script>
        // Membuat bintang secara acak
        const starField = document.getElementById('starField');
        const starCount = 100;

        for (let i = 0; i < starCount; i++) {
            const star = document.createElement('div');
            star.className = 'star';
            
            const size = Math.random() * 3 + 'px';
            star.style.width = size;
            star.style.height = size;
            
            star.style.top = Math.random() * 100 + '%';
            star.style.left = Math.random() * 100 + '%';
            
            star.style.setProperty('--duration', Math.random() * 3 + 2 + 's');
            
            starField.appendChild(star);
        }
    </script>
</body>
</html>
